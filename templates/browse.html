{% extends "base.html" %}

{% block title %}Browse Papers{% endblock %}

{% block content %}
<section class="workspace" data-page="browse">
  <section class="results-shell">
    <div class="section-head">
      <h2>Papers</h2>
      <span id="result-count">0 papers</span>
    </div>
    <div class="filter-toolbar">
      <button class="ghost-button filter-toggle" id="open-filters" type="button">Filter</button>
      <button class="ghost-button" id="clear-filters" type="button">Clear all</button>
    </div>
    <div id="active-filters" class="filter-chips" aria-live="polite"></div>
    <div id="result-status" class="result-status" aria-live="polite"></div>
    <div id="results" class="paper-list" aria-live="polite"></div>
    <div class="results-actions">
      <button class="ghost-button" id="load-more" type="button" hidden>Load more</button>
    </div>
  </section>

  <aside class="filter-drawer" id="filter-drawer" hidden>
    <div class="filter-backdrop" data-filter-close></div>
    <section class="filter-dialog" aria-labelledby="filter-title">
      <header class="filter-dialog-head">
        <h2 id="filter-title">Filter papers</h2>
        <button class="ghost-button" type="button" data-filter-close>Close</button>
      </header>
      <div class="checkbox-groups" id="filter-groups"></div>
      <footer class="filter-dialog-actions">
        <button class="download-button" id="apply-filters" type="button">View results</button>
        <button class="ghost-button" id="drawer-clear-filters" type="button">Clear all</button>
      </footer>
    </section>
  </aside>
</section>
{% endblock %}
