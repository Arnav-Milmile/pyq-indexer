name: Scheduled paper index sync

on:
  workflow_dispatch:
  schedule:
    # Every two months on the 1st day at 02:30 UTC.
    - cron: "30 2 1 */2 *"

permissions:
  contents: write

jobs:
  sync-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync FTP index
        run: python sync_ftp.py

      - name: Rebuild metadata
        run: python rebuild_metadata.py

      - name: Commit updated index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh paper index"
          file_pattern: data/papers.db
